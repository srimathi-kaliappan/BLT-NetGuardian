<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerabilities - BLT-NetGuardian</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="font-sans text-gray-900">

<div class="min-h-screen lg:flex">

    <!-- Sidebar -->
    <aside class="hidden lg:flex lg:w-64 flex-col border-r bg-white p-4">
        <h1 class="text-xl font-bold mb-6">BLT-NetGuardian</h1>

        <nav class="space-y-2">
            <a href="index.html" class="block p-2 hover:bg-gray-100 rounded">Overview</a>
            <a href="dashboard.html" class="block p-2 hover:bg-gray-100 rounded">Dashboard</a>
            <a href="vulnerabilities.html" class="block p-2 bg-red-100 text-red-600 rounded">Vulnerabilities</a>
        </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1">

        <!-- Header -->
        <header class="border-b p-4 flex justify-between">
            <h2 class="text-xl font-bold">Vulnerabilities</h2>

            <button id="refreshBtn" class="bg-red-600 text-white px-4 py-2 rounded">
                Refresh
            </button>
        </header>

        <!-- Content -->
        <main class="p-6 space-y-6">

            <!-- Filters -->
            <div class="flex flex-col md:flex-row gap-3">

                <input id="vulnSearch"
                       type="text"
                       placeholder="Search vulnerabilities"
                       class="border p-2 rounded w-full md:w-1/3"
                       aria-label="Search vulnerabilities">

                <select id="severityFilter"
                        class="border p-2 rounded w-full md:w-1/4"
                        aria-label="Filter severity">
                    <option value="">All</option>
                    <option value="critical">Critical</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                    <option value="info">Info</option>
                </select>

            </div>

            <!-- Summary -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

                <div class="bg-white p-4 rounded shadow">
                    <p>Critical</p>
                    <h3 id="criticalCount" class="text-2xl font-bold text-red-600">0</h3>
                </div>

                <div class="bg-white p-4 rounded shadow">
                    <p>High</p>
                    <h3 id="highCount" class="text-2xl font-bold text-orange-600">0</h3>
                </div>

                <div class="bg-white p-4 rounded shadow">
                    <p>Medium</p>
                    <h3 id="mediumCount" class="text-2xl font-bold text-yellow-600">0</h3>
                </div>

                <div class="bg-white p-4 rounded shadow">
                    <p>Low</p>
                    <h3 id="lowCount" class="text-2xl font-bold text-green-600">0</h3>
                </div>

            </div>

            <!-- Table -->
            <div class="bg-white p-4 rounded shadow">

                <!-- Loading -->
                <div id="vulnsLoading" class="text-center p-4">
                    Loading vulnerabilities...
                </div>

                <!-- Table -->
                <table id="vulnsTable" style="display:none;" class="w-full border">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="p-2">Severity</th>
                            <th class="p-2">Title</th>
                            <th class="p-2">Type</th>
                            <th class="p-2">Component</th>
                            <th class="p-2">CVE</th>
                            <th class="p-2">CVSS</th>
                            <th class="p-2">Date</th>
                        </tr>
                    </thead>

                    <tbody id="vulnsTableBody"></tbody>
                </table>

                <!-- Empty -->
                <div id="vulnsEmpty" class="hidden text-center p-4">
                    No vulnerabilities found
                </div>

            </div>

        </main>

    </div>

</div>

<!--  FIX: defer scripts -->
<script src="assets/js/config.js" defer></script>
<script src="assets/js/vulnerabilities.js" defer></script>

<!--  Button JS -->
<script defer>
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("refreshBtn")?.addEventListener("click", () => {
        if (window.refreshVulnerabilities) {
            window.refreshVulnerabilities();
        }
    });
});
</script>

</body>
</html>
