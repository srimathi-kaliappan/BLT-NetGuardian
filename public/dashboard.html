<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLT-NetGuardian Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#E10101',
                        'neutral-border': '#E5E5E5',
                        'dark-base': '#111827'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="font-sans bg-gray-50 text-gray-900">

<div class="min-h-screen lg:flex">

    <!-- Sidebar -->
    <aside class="hidden lg:flex lg:w-64 flex-col border-r bg-white p-4">
        <h1 class="text-xl font-bold mb-6">BLT-NetGuardian</h1>

        <nav class="space-y-2">
            <a href="index.html" class="block p-2 hover:bg-gray-100 rounded">Home</a>
            <a href="dashboard.html" class="block p-2 bg-red-100 text-red-600 rounded">Dashboard</a>
            <a href="vulnerabilities.html" class="block p-2 hover:bg-gray-100 rounded">Vulnerabilities</a>
        </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1">

        <!-- Header -->
        <header class="bg-white border-b p-4 flex justify-between items-center">
            <h2 class="text-xl font-bold">Jobs Dashboard</h2>

            <button id="refreshBtn" class="bg-red-600 text-white px-4 py-2 rounded">
                Refresh
            </button>
        </header>

        <!-- Content -->
        <main class="p-6 space-y-6">

            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

                <div class="bg-white p-4 rounded shadow">
                    <p>Total Jobs</p>
                    <h3 id="totalJobs" class="text-2xl font-bold">0</h3>
                </div>

                <div class="bg-white p-4 rounded shadow">
                    <p>Active Jobs</p>
                    <h3 id="activeJobs" class="text-2xl font-bold">0</h3>
                </div>

                <div class="bg-white p-4 rounded shadow">
                    <p>Vulnerabilities</p>
                    <h3 id="totalVulnerabilities" class="text-2xl font-bold">0</h3>
                </div>

                <div class="bg-white p-4 rounded shadow">
                    <p>Critical</p>
                    <h3 id="criticalVulns" class="text-2xl font-bold text-red-600">0</h3>
                </div>

            </div>

            <!-- Current Job -->
            <div id="currentJobSection" class="hidden bg-white p-4 rounded shadow">
                <h3 class="font-bold mb-2">Current Job</h3>
                <div id="currentJobStatus"></div>
            </div>

            <!-- Jobs Table -->
            <div class="bg-white p-4 rounded shadow">

                <div class="flex flex-col md:flex-row gap-3 mb-4">

                    <input id="jobsSearch"
                           type="text"
                           placeholder="Search..."
                           aria-label="Search jobs"
                           class="border p-2 rounded w-full md:w-1/3">

                    <select id="jobsStatusFilter"
                            aria-label="Filter jobs"
                            class="border p-2 rounded w-full md:w-1/4">
                        <option value="">All</option>
                        <option value="queued">Queued</option>
                        <option value="running">Running</option>
                        <option value="completed">Completed</option>
                        <option value="failed">Failed</option>
                    </select>

                </div>

                <!-- Loading -->
                <div id="jobsLoading" class="text-center p-4">
                    Loading jobs...
                </div>

                <!-- Table -->
                <table id="jobsTable" style="display:none;" class="w-full border">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="p-2">Job ID</th>
                            <th class="p-2">Target</th>
                            <th class="p-2">Status</th>
                            <th class="p-2">Progress</th>
                            <th class="p-2">Created</th>
                            <th class="p-2">Action</th>
                        </tr>
                    </thead>

                    <tbody id="jobsTableBody"></tbody>
                </table>

                <!-- Empty -->
                <div id="jobsEmpty" class="hidden text-center p-4">
                    No jobs found
                </div>

            </div>

        </main>

    </div>

</div>

<!--  JS (fixed with defer) -->
<script src="assets/js/config.js" defer></script>
<script src="assets/js/dashboard.js" defer></script>

<!--  Button JS -->
<script defer>
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("refreshBtn")?.addEventListener("click", () => {
        if (window.refreshDashboard) {
            window.refreshDashboard();
        }
    });
});
</script>

</body>
</html>
