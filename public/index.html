<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLT-NetGuardian - Autonomous Security Scanner</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="font-sans text-gray-900">

<div class="min-h-screen lg:flex">

    <!-- Sidebar -->
    <aside class="hidden lg:flex lg:w-64 flex-col border-r bg-white p-4">
        <h1 class="text-xl font-bold mb-6">BLT-NetGuardian</h1>

        <nav class="space-y-2">
            <a href="index.html" class="block p-2 bg-red-100 text-red-600 rounded">Overview</a>
            <a href="dashboard.html" class="block p-2 hover:bg-gray-100 rounded">Dashboard</a>
            <a href="vulnerabilities.html" class="block p-2 hover:bg-gray-100 rounded">Vulnerabilities</a>
        </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1">

        <!-- Header -->
        <header class="border-b p-4 flex justify-between">
            <h2 class="text-xl font-bold">Autonomous Scanner</h2>

            <div class="space-x-2">
                <a href="dashboard.html" class="bg-gray-200 px-3 py-1 rounded">Dashboard</a>
                <a href="vulnerabilities.html" class="bg-red-600 text-white px-3 py-1 rounded">Vulnerabilities</a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="p-6 space-y-6">

            <!-- Status -->
            <div class="bg-white p-4 rounded shadow">
                <p id="scanningTarget">Scanning: example.com</p>
                <p id="scannedCount">Scanned today: 0</p>
                <p id="foundVulns">Vulnerabilities: 0</p>
            </div>

            <!-- Suggest Target -->
            <div class="bg-white p-4 rounded shadow">
                <h3 class="font-bold mb-2">Suggest Target</h3>

                <form id="suggestionForm">
                    <input id="suggestion"
                           type="text"
                           placeholder="Enter domain or repo"
                           required
                           class="border p-2 w-full mb-2 rounded">

                    <label>
                        <input type="checkbox" id="priority"> Priority
                    </label>

                    <br><br>

                    <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded">
                        Submit
                    </button>
                </form>

                <div id="suggestionMessage" class="mt-2"></div>
            </div>

            <!-- Discoveries -->
            <div class="bg-white p-4 rounded shadow">
                <h3 class="font-bold mb-2">Recent Discoveries</h3>

                <div id="discoveriesList">
                    <p>No data</p>
                </div>
            </div>

        </main>

    </div>

</div>

<!--  FIX: Use defer -->
<script src="assets/js/config.js" defer></script>
<script src="assets/js/autonomous.js" defer></script>

</body>
</html>
